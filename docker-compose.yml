version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      - API_DATA_DIR=forecasting-product/data/
      - API_METRICS_DIR=forecasting-product/data/metrics/
    volumes:
      - ./forecasting-product/data:/app/forecasting-product/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  streamlit:
    build:
      context: .
      target: streamlit
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./forecasting-product/data:/app/forecasting-product/data
    depends_on:
      - api

  frontend:
    build:
      context: ./forecasting-product/frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-docker-dev-secret}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - api
