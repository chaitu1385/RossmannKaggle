# M5 Monthly Frequency Configuration
# -------------------------------------
# Walmart M5 dataset aggregated to monthly granularity.
# 10 sampled series, 3 stores, 6-month forecast horizon.

lob: walmart_m5_monthly

forecast:
  frequency: "M"
  horizon_weeks: 6
  target_column: "quantity"
  time_column: "date"
  series_id_column: "series_id"
  forecasters:
    - naive_seasonal
    - auto_ets
    - lgbm_direct
  quantiles: [0.1, 0.5, 0.9]
  sparse_detection: true
  sparse_adi_threshold: 1.32
  sparse_cv2_threshold: 0.49

backtest:
  n_folds: 2
  val_weeks: 6
  gap_weeks: 0
  primary_metric: "wmape"

metrics:
  - wmape
  - normalized_bias
  - mae

data_quality:
  validation:
    min_history_periods: 12
    max_missing_pct: 0.15
    max_zero_pct: 0.50
  cleansing:
    outlier_method: "iqr"
    iqr_multiplier: 1.5
    outlier_action: "clip"
    stockout_detection: true
    min_zero_run: 2

hierarchies:
  - name: "product"
    levels: ["cat_id", "dept_id", "series_id"]
    id_column: "series_id"
    fixed: false
  - name: "geography"
    levels: ["state_id", "store_id", "series_id"]
    id_column: "series_id"
    fixed: false

reconciliation:
  method: "bottom_up"
