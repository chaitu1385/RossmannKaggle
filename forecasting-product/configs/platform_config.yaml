# ═══════════════════════════════════════════════════════════════════════════════
# Forecasting Product — Base Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# This is the shared baseline.  LOB-specific configs (configs/lob/*.yaml)
# inherit from this file and override only the sections that differ.

lob: default
description: "Base forecasting platform configuration"

# ── Hierarchy definitions ─────────────────────────────────────────────────────
# Levels are ordered root → leaf.  'id_column' is the DataFrame column that
# holds the leaf-level identifier.  'fixed: true' means the pipeline runs
# separately for each value (e.g. Consumer vs Commercial — never reconciled).

hierarchies:
  - name: product
    levels: [product_group, product, product_unit]
    id_column: product_unit
    fixed: false
    reconciliation_level: product_unit  # middle-out home grain

  - name: geography
    levels: [global, region, subregion, country]
    id_column: country
    fixed: false
    reconciliation_level: subregion     # CDS subregion

  - name: channel
    levels: [channel]
    id_column: channel
    fixed: true                          # Consumer / Commercial run separately

# ── Reconciliation ────────────────────────────────────────────────────────────
reconciliation:
  method: middle_out                     # bottom_up | top_down | middle_out | mint
  product_level: product_unit
  geography_level: subregion

# ── Forecasting ───────────────────────────────────────────────────────────────
forecast:
  horizon_weeks: 39                      # 9 months
  frequency: W
  target_column: quantity
  time_column: week
  series_id_column: series_id
  forecasters:
    - naive_seasonal
    - auto_arima
    - auto_ets
    - lgbm_direct
    - xgboost_direct
    # Statistical models (statsforecast):
    # - auto_theta       # Automatic Theta method (competitive with ETS/ARIMA)
    # - mstl             # Multi-seasonal STL decomposition (weekly + yearly)

    # Neural models (neuralforecast — pip install neuralforecast):
    # - nbeats           # N-BEATS: pure DL with trend/seasonality stacks
    # - nhits            # N-HiTS: hierarchical interpolation, faster than N-BEATS
    # - tft              # Temporal Fusion Transformer: attention + external features

    # Foundation models (zero-shot — no training required):
    # - chronos          # Amazon Chronos (local, open-source); pip install chronos-forecasting torch
    # - timegpt          # Nixtla TimeGPT (API); pip install nixtla; set NIXTLA_API_KEY

  # ── Intermittent / sparse demand ─────────────────────────────────────────
  # Series classified as intermittent (ADI ≥ adi_threshold) are routed to
  # these models instead of the regular forecasters above.
  # Leave empty to disable sparse routing (default).
  intermittent_forecasters: []
  # - croston_sba      # Syntetos-Boylan bias-corrected Croston (recommended)
  # - tsb              # Teunter-Syntetos-Babai (handles obsolescence)
  # - croston          # Classic Croston (1972)
  sparse_detection: true
  sparse_adi_threshold: 1.32             # ADI ≥ threshold → sparse (SBC)
  sparse_cv2_threshold: 0.49             # CV² threshold for SBC classification

  # ── External regressors (promotions, holidays, price) ──────────────────
  # When enabled, external feature columns are joined to the training data
  # and passed to ML models (LightGBM, XGBoost).  Statistical models
  # (ARIMA, ETS) ignore external features.
  #
  # IMPORTANT: each feature must be classified as "known_ahead" or
  # "contemporaneous" via the feature_types mapping.
  #   - known_ahead:      plannable features whose future values are known
  #                        (holiday calendars, planned promotions). Safe to
  #                        forward-fill at prediction time.
  #   - contemporaneous:   features derived from actual observations (e.g.
  #                        actual promo ratio, foot traffic).  These REQUIRE
  #                        explicit future values or they are dropped at
  #                        prediction time to prevent data leakage.
  external_regressors:
    enabled: false                         # set to true when feature data is available
    feature_columns: []                    # e.g. [promotion_flag, holiday_flag, price_index]
    future_features_path: null             # path to Parquet with future feature values for prediction
    feature_types: {}                      # e.g. {holiday_flag: known_ahead, promo_ratio: contemporaneous}

# ── Backtesting ───────────────────────────────────────────────────────────────
# NOTE: For datasets with < 3 years of history, consider reducing n_folds
# and val_weeks to preserve enough training data after lag consumption.
# Recommended for short histories: n_folds: 2, val_weeks: 8
backtest:
  n_folds: 3
  val_weeks: 13                          # 3 months per fold
  gap_weeks: 0
  champion_granularity: lob              # one winner per LOB to start
  primary_metric: wmape
  secondary_metric: normalized_bias

# ── Product transition ────────────────────────────────────────────────────────
transition:
  transition_window_weeks: 13            # 3-month overlap
  ramp_shape: linear                     # linear | scurve | step
  enable_overrides: true
  override_store_path: data/overrides.duckdb

# ── Output ────────────────────────────────────────────────────────────────────
output:
  grain:
    product: product_unit                # SKU
    geography: country
    channel: channel
  forecast_path: data/forecasts/
  metrics_path: data/metrics/
  bi_export_path: data/bi_exports/
  format: parquet

# ── Metrics ───────────────────────────────────────────────────────────────────
metrics:
  - wmape
  - normalized_bias
