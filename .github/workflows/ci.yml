name: CI

on:
  push:
    branches: [master, main, 'claude/**', 'copilot/**']
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check forecasting-product/src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: forecasting-product/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r forecasting-product/requirements.txt
          pip install pytest pytest-cov httpx rapidfuzz

      - name: Run tests
        working-directory: forecasting-product
        run: |
          python -m pytest \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: forecasting-product/coverage.xml

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: |
          docker build \
            --target production \
            -t forecasting-product:${{ github.sha }} \
            forecasting-product/

      - name: Verify image runs
        run: |
          docker run --rm -d \
            --name fp-smoke \
            -p 8000:8000 \
            forecasting-product:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:8000/health || (docker logs fp-smoke && exit 1)
          docker stop fp-smoke
