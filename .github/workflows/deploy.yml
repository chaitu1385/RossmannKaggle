name: Deploy

on:
  push:
    tags: ['v*']

env:
  IMAGE_NAME: forecasting-platform

jobs:
  deploy:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Option A: Azure Container Registry ─────────────────────────
      - name: Login to Azure Container Registry
        if: vars.DEPLOY_TARGET == 'azure' || vars.DEPLOY_TARGET == 'both'
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push to ACR
        if: vars.DEPLOY_TARGET == 'azure' || vars.DEPLOY_TARGET == 'both'
        run: |
          docker build \
            --target production \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            forecasting-platform/
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # ── Option B: GitHub Container Registry ────────────────────────
      - name: Login to GitHub Container Registry
        if: vars.DEPLOY_TARGET == 'ghcr' || vars.DEPLOY_TARGET == 'both' || vars.DEPLOY_TARGET == ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        if: vars.DEPLOY_TARGET == 'ghcr' || vars.DEPLOY_TARGET == 'both' || vars.DEPLOY_TARGET == ''
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          docker build \
            --target production \
            -t ${IMAGE}:${{ steps.version.outputs.VERSION }} \
            -t ${IMAGE}:latest \
            forecasting-platform/
          docker push ${IMAGE}:${{ steps.version.outputs.VERSION }}
          docker push ${IMAGE}:latest

      - name: Summary
        run: |
          echo "### Deployed ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "Deploy target: ${{ vars.DEPLOY_TARGET || 'ghcr (default)' }}" >> $GITHUB_STEP_SUMMARY
