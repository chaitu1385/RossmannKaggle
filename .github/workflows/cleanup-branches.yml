name: Cleanup Old Branches

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (list branches to delete without actually deleting)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  cleanup:
    name: Delete Old Branches
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Delete old branches (keep master/main only)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const dryRun = '${{ github.event.inputs.dry_run }}' === 'true';
            const keepBranches = ['master', 'main'];

            // Fetch all branches (paginated)
            const branches = await github.paginate(
              github.rest.repos.listBranches,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            console.log(`Found ${branches.length} branches total.`);

            const toDelete = branches
              .map(b => b.name)
              .filter(name => !keepBranches.includes(name));

            if (toDelete.length === 0) {
              console.log('No branches to delete.');
              return;
            }

            console.log(`\nBranches to delete (${toDelete.length}):`);
            for (const branch of toDelete) {
              console.log(`  - ${branch}`);
            }

            if (dryRun) {
              console.log('\nDry run enabled — no branches were deleted.');
              return;
            }

            console.log('\nDeleting branches...');
            let deleted = 0;
            let failed = 0;
            for (const branch of toDelete) {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch}`,
                });
                console.log(`  ✓ Deleted: ${branch}`);
                deleted++;
              } catch (err) {
                console.error(`  ✗ Failed to delete ${branch}: ${err.message}`);
                failed++;
              }
            }

            console.log(`\nDone. Deleted: ${deleted}, Failed: ${failed}.`);
